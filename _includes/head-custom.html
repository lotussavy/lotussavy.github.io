{% if page.robots %}
<meta name="robots" content="{{ page.robots }}">
{% endif %}
{% assign social_image = page.image | default: site.image %}
{% if social_image %}
<meta property="og:image" content="{{ social_image | absolute_url }}">
<meta name="twitter:image" content="{{ social_image | absolute_url }}">
{% endif %}
<meta name="keywords" content="{{ site.keywords }}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.author.name }}",
  "url": "{{ site.author.url }}",
  "image": "{{ site.image | absolute_url }}",
  "email": "mailto:{{ site.author.email }}",
  "jobTitle": "{{ site.institution.role }}",
  "affiliation": {
    "@type": "CollegeOrUniversity",
    "name": "{{ site.institution.name }}",
    "department": "{{ site.institution.department }}"
  },
  "alumniOf": {
    "@type": "CollegeOrUniversity",
    "name": "{{ site.institution.name }}"
  },
  "knowsAbout": [
    "Advanced Air Mobility",
    "Neurosymbolic AI",
    "Machine Learning",
    "Time Series Forecasting",
    "Transportation Planning",
    "Optimization"
  ],
  "sameAs": [
    "https://orcid.org/{{ site.author.orcid }}",
    "https://github.com/{{ site.author.github }}",
    "https://linkedin.com/in/lotussavy318",
    "https://scholar.google.com/citations?user=0uLqckgAAAAJ&hl=en",
    "https://www.researchgate.net/profile/{{ site.author.researchgate }}"
  ]
}
</script>
{% if page.url == '/publications/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "Selected peer-reviewed publications by {{ site.author.name }}",
  "url": "{{ page.url | absolute_url }}",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "item": {
        "@type": "ScholarlyArticle",
        "name": "Demand Modeling for Advanced Air Mobility: Challenges, Opportunities, and Future Directions",
        "author": { "@type": "Person", "name": "{{ site.author.name }}" },
        "datePublished": "2026",
        "isPartOf": { "@type": "Periodical", "name": "IEEE Transactions on Intelligent Transportation Systems" },
        "sameAs": "https://doi.org/10.1109/TITS.2026.3671002"
      }
    },
    {
      "@type": "ListItem",
      "position": 2,
      "item": {
        "@type": "ScholarlyArticle",
        "name": "A Comprehensive Review of Neuro-symbolic AI for Robustness, Uncertainty Quantification, and Intervenability",
        "author": { "@type": "Person", "name": "{{ site.author.name }}" },
        "datePublished": "2025",
        "isPartOf": { "@type": "Periodical", "name": "Arabian Journal for Science and Engineering" },
        "sameAs": "https://doi.org/10.1007/s13369-025-10887-3"
      }
    },
    {
      "@type": "ListItem",
      "position": 3,
      "item": {
        "@type": "ScholarlyArticle",
        "name": "A Survey on Symbolic Knowledge Distillation of Large Language Models",
        "author": { "@type": "Person", "name": "{{ site.author.name }}" },
        "datePublished": "2024",
        "isPartOf": { "@type": "Periodical", "name": "IEEE Transactions on Artificial Intelligence" },
        "sameAs": "https://doi.org/10.1109/TAI.2024.3428519"
      }
    },
    {
      "@type": "ListItem",
      "position": 4,
      "item": {
        "@type": "ScholarlyArticle",
        "name": "Neurosymbolic Reinforcement Learning and Planning: A Survey",
        "author": { "@type": "Person", "name": "{{ site.author.name }}" },
        "datePublished": "2024",
        "isPartOf": { "@type": "Periodical", "name": "IEEE Transactions on Artificial Intelligence" },
        "sameAs": "https://doi.org/10.1109/TAI.2023.3311428"
      }
    },
    {
      "@type": "ListItem",
      "position": 5,
      "item": {
        "@type": "ScholarlyArticle",
        "name": "Urban Air Mobility Flight Demand Modeling for Airports in New York City",
        "author": { "@type": "Person", "name": "{{ site.author.name }}" },
        "datePublished": "2026",
        "isPartOf": { "@type": "PublicationIssue", "name": "AIAA SCITECH 2026 Forum" },
        "sameAs": "https://doi.org/10.2514/6.2026-1475"
      }
    }
  ]
}
</script>
{% endif %}

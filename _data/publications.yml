  research_area: "Trustworthy Neurosymbolic AI"
  publication_date: "2025-12-09"
  volume: "51"
  pages: "35-67"
  source_url: "https://link.springer.com/article/10.1007/s13369-025-10887-3"
  pdf: "https://link.springer.com/article/10.1007/s13369-025-10887-3"
  hero_subtitle: "An open-access Arabian Journal for Science and Engineering survey on neuro-symbolic AI as a trustworthy AI paradigm, organized around robustness, uncertainty quantification, and intervenability."
  abstract_summary: "As Artificial Intelligence (AI) systems are increasingly deployed in high-stakes domains such as healthcare, autonomous systems, finance, and critical infrastructure, ensuring their trustworthiness has become imperative. This paper presents a comprehensive survey of neuro-symbolic AI, a hybrid paradigm that combines the learning capabilities of neural networks with the reasoning strengths of symbolic AI, through the lens of three foundational dimensions: robustness, uncertainty quantification (UQ), and intervenability. We first establish the limitations of purely data-driven “black-box” models in handling distribution shifts, ambiguous inputs, and human oversight. In contrast, neuro-symbolic systems offer enhanced interpretability, verifiability, and control, making them promising candidates for real-world deployment. We systematically review state-of-the-art techniques for modeling robustness, quantifying uncertainty, and enabling intervenability. We further examine how logic, probability, and learning can be integrated into unified or modular architectures to support transparent, adaptive reasoning. Finally, we outline current challenges and identify key research opportunities for advancing neuro-symbolic AI as a trustworthy paradigm. This survey aims to equip researchers and practitioners with a structured understanding of how to build reliable, interpretable, and interactive AI systems by bridging statistical learning and symbolic reasoning."
  research_summary:
    - "This paper studies neuro-symbolic AI through the lens of trustworthiness. The core motivation is that purely data-driven models can perform well in controlled settings but may fail under distribution shifts, ambiguous inputs, or high-stakes decision contexts where transparency and human oversight are necessary."
    - "The survey organizes the field around three dimensions: robustness, uncertainty quantification, and intervenability. Robustness concerns whether AI systems remain reliable under perturbations and new conditions. Uncertainty quantification concerns whether systems can express confidence and ambiguity. Intervenability concerns whether humans can inspect, correct, or guide the reasoning process."
    - "By connecting neural learning with symbolic reasoning, the paper explains how AI systems can become more interpretable, verifiable, and controllable. This makes the survey relevant to safety-critical applications such as autonomous systems, cybersecurity, healthcare, finance, and critical infrastructure."
  plain_language_summary: "This paper studies how AI systems can become more reliable and controllable by combining neural networks, which learn from data, with symbolic reasoning, which supports logic, rules, and explanation."
  contributions:
    - "Organizes neuro-symbolic AI around robustness, uncertainty quantification, and intervenability."
    - "Reviews methods for making AI systems more reliable under distribution shifts and ambiguous inputs."
    - "Connects symbolic reasoning with transparent, adaptive, and human-interpretable AI decision-making."
    - "Identifies open research challenges for deploying trustworthy neuro-symbolic systems."
  impact: "AI systems used in healthcare, autonomous systems, finance, cybersecurity, and critical infrastructure must do more than produce accurate predictions. They must remain reliable under unexpected conditions, communicate uncertainty, and allow meaningful human oversight. This paper frames neuro-symbolic AI as a practical route toward systems that combine statistical learning with explicit reasoning, making them more suitable for high-stakes deployment."
  framework_steps:
    title: "Trustworthy Neuro-Symbolic AI Framework"
    items:
    - name: "Robustness"
      description: "Studies whether AI systems maintain stable and reliable behavior under noisy inputs, distribution shifts, adversarial perturbations, and unexpected operating conditions."
    - name: "Uncertainty Quantification"
      description: "Examines how AI systems estimate confidence, represent aleatoric and epistemic uncertainty, and communicate ambiguity in predictions."
    - name: "Intervenability"
      description: "Focuses on whether humans can inspect, correct, steer, or constrain model behavior through concepts, rules, explanations, or symbolic interfaces."
  modeling_approaches:
    - name: "Learning for Reasoning"
      description: "Uses neural models to support symbolic reasoning by extracting representations, reducing search spaces, or translating raw data into symbolic structures."
    - name: "Reasoning for Learning"
      description: "Uses symbolic rules, constraints, priors, and domain knowledge to guide neural learning and improve generalization."
    - name: "Learning-Reasoning"
      description: "Integrates neural and symbolic modules bidirectionally so learning and reasoning refine each other in a unified architecture."
    - name: "Probabilistic Neuro-Symbolic AI"
      description: "Combines logic, probability, and learning to represent uncertainty while preserving structured reasoning."
    - name: "Human-in-the-Loop Neuro-Symbolic AI"
      description: "Enables concept correction, rule injection, interactive debugging, and governance through interpretable symbolic components."

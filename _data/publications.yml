  hero_subtitle: "An IJCAI 2025 Survey Track paper on how neurosymbolic AI can support reliable, transparent, and regulation-aware Advanced Air Mobility systems."
  abstract_summary: "Neurosymbolic AI combines neural network adaptability with symbolic reasoning, promising an approach to address the complex regulatory, operational, and safety challenges in Advanced Air Mobility (AAM). This survey reviews its applications across key AAM domains such as demand forecasting, aircraft design, and real-time air traffic management. Our analysis reveals a fragmented research landscape where methodologies, including Neurosymbolic Reinforcement Learning, have shown potential for dynamic optimization but still face hurdles in scalability, robustness, and compliance with aviation standards. We classify current advancements, present relevant case studies, and outline future research directions aimed at integrating these approaches into reliable, transparent AAM systems. By linking advanced AI techniques with AAM’s operational demands, this work provides a concise roadmap for researchers and practitioners developing next-generation air mobility solutions."
  research_summary:
    - "This survey connects the third wave of AI, neurosymbolic AI, with the operational demands of Advanced Air Mobility. It argues that AAM systems need models that can learn from heterogeneous data such as sensor streams, flight trajectories, infrastructure constraints, weather, demand, and traffic conditions while also respecting explicit aviation rules and safety constraints."
    - "The paper reviews the background of neurosymbolic AI and AAM, then maps neurosymbolic methods to AAM domains including electrification, aircraft design, training and simulation, predictive maintenance, safety, autonomy, cybersecurity, and demand modeling."
    - "A key theme is that neural models alone can be difficult to certify or explain in aviation contexts. Symbolic reasoning can encode rules, domain knowledge, regulatory constraints, safety protocols, and operational guidelines, making AI decisions more interpretable and better aligned with aviation standards."
    - "The survey presents FAA and EASA AI roadmaps as case studies for aviation AI safety assurance. These examples show why certification, human oversight, explainability, risk-based deployment, and regulatory alignment are central issues for neurosymbolic AAM systems."
    - "The paper organizes major risks into technological, ethical, and governance challenges. These include data integration, interoperability, cybersecurity, scalability, accountability, fairness, public trust, certification, legal compliance, privacy, and lifecycle management."
  plain_language_summary: "The paper explains how AI systems that combine data learning with rule-based reasoning could help make future air mobility safer, more transparent, easier to certify, and better aligned with aviation regulations."
  contributions:
    - "Provides a comprehensive survey of neurosymbolic AI integration across Advanced Air Mobility domains."
    - "Classifies application areas including electrification, aircraft design, training and simulation, predictive maintenance, safety, autonomy, cybersecurity, and demand modeling."
    - "Discusses FAA and EASA AI roadmaps as aviation safety assurance case studies."
    - "Identifies technological, ethical, regulatory, governance, and lifecycle challenges for deploying neurosymbolic AI in AAM."
    - "Outlines future research directions for reliable, transparent, and certifiable AAM AI systems."
  impact: "AAM depends on autonomous and AI-assisted decisions in safety-critical, regulated environments. This survey frames neurosymbolic AI as a practical path toward systems that can learn from complex data while still exposing rule-grounded, auditable, and certifiable reasoning."
  framework_steps:
    title: "Neurosymbolic AI and AAM Survey Framework"
    items:
    - name: "Background"
      description: "Introduces neurosymbolic AI as a hybrid of neural learning and symbolic reasoning, and positions AAM as a safety-critical transportation transformation."

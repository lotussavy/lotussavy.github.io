  title: "SKGHOI: Spatial-Semantic Knowledge Graph for Human-Object Interaction Detection"
  slug: "skghoi-spatial-semantic-knowledge-graph-for-human-object-interaction-detection"
  venue: "IEEE ICDMW 2023"
  doi: "10.1109/ICDMW60847.2023.00155"
  url: "https://doi.org/10.1109/ICDMW60847.2023.00155"
  schema_part_of: "PublicationIssue"
  tags:
    - "Knowledge Graph"
    - "Human-Object Interaction"
    - "Computer Vision"
    - "Graph Neural Network"
    - "Spatial-Semantic Representation"
  research_area: "Knowledge Graphs for Human-Object Interaction Detection"
  repository_url: "https://mdsoar.org/items/d48086ae-30c7-44ee-836f-d633242b2a91"
  preprint_url: "https://arxiv.org/abs/2303.04253"
  pages: "1186-1193"
  abstract_summary: "Human-Object Interaction (HOI) detection is a challenging computer vision task that aims to recognize and understand the interactions between humans and objects in images or videos. Existing techniques heavily rely on appearance-based features and computationally expensive transformer models for semantic representation. In this paper, we propose SKGHOI (Spatial-Semantic Knowledge Graph for HOI), a novel graph-based approach that efficiently captures semantic representation by integrating spatial and semantic knowledge. SKGHOI constructs a graph with interaction components as nodes and spatial relationships as edges. Our approach leverages spatial and semantic encoders to extract spatial and semantic information, which are then fused to create a knowledge graph that captures the semantic representation of HOIs. Compared to existing methods, SKGHOI offers computational efficiency and the incorporation of prior knowledge, making it practical for real-world applications. Experimental evaluations on the widely-used HICO-DET datasets demonstrate that SKGHOI outperforms state-of-the-art graph-based methods by a significant margin, showcasing its effectiveness and potential for improving the accuracy and efficiency of HOI detection."
  research_summary:
    - "This paper addresses human-object interaction detection, where models must recognize not only people and objects but also interaction triplets such as person, verb, and object."
    - "SKGHOI builds a graph with interaction components as nodes and spatial relationships as edges. It combines appearance features, spatial information, and translated semantic features from a knowledge graph embedding model."
    - "The method uses object detection to generate human-object candidate pairs, a translational model to produce semantic embeddings, and a graph model to make the final HOI prediction."
    - "Experiments on HICO-DET show that SKGHOI improves over graph-based baselines while using compact semantic features, offering a practical way to incorporate prior knowledge without heavy transformer-style semantic computation."
  plain_language_summary: "The paper improves computer vision models that detect how people interact with objects by using a knowledge graph that captures both spatial relationships and semantic meaning."
  contributions:
    - "Introduces SKGHOI, a spatial-semantic knowledge graph approach for HOI detection."
    - "Represents interaction components as graph nodes and spatial relationships as graph edges."
    - "Combines appearance features, spatial features, and KGE-translated semantic features."
    - "Improves graph-based HOI detection performance on HICO-DET."
    - "Uses compact semantic embeddings to reduce computational burden compared with heavier semantic representations."
  impact: "The work offers a more efficient graph-based direction for human-object interaction detection by incorporating prior knowledge, spatial context, and semantic representation in one HOI graph."
  hero_subtitle: "An IEEE ICDMW conference paper on human-object interaction detection using a spatial-semantic knowledge graph."
  framework_steps:
    title: "Spatial-Semantic HOI Detection Framework"
    items:
    - name: "Detect Instances"
      description: "Uses object detection to identify human and object instances and generate human-object candidate pairs."
    - name: "Build HOI Graph"
      description: "Represents interaction components as nodes and spatial relationships as edges."
    - name: "Translate Semantics"
      description: "Uses knowledge graph embedding to produce compact semantic features for HOI representation."
    - name: "Predict Interactions"
      description: "Combines appearance, spatial, and translated semantic features in a graph model for HOI prediction."
  modeling_approaches_title: "Method Components"
  modeling_approaches:
    - name: "Knowledge Graph"
      description: "Provides structured prior knowledge for human-object interaction reasoning."
    - name: "Spatial Encoder"
      description: "Represents geometric relationships among humans, objects, and visual context."
    - name: "Semantic Encoder"
      description: "Adds meaning-level information that complements visual appearance features."
    - name: "Graph-Based HOI Detection"
      description: "Combines spatial and semantic signals for efficient interaction detection."
    - name: "Knowledge Graph Embedding"
      description: "Translates semantic information into compact features that improve HOI graph representations."
  research_gaps:
    - "Spatial reasoning"

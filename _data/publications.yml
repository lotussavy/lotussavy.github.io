  research_area: "Advanced Air Mobility Demand Modeling"
  pages: "2855-2863"
  hero_subtitle: "An IEEE BigData 2024 paper on Tennessee census-tract AAM demand modeling using employment trips, cost-time-risk modeling, and generalized cost of trip."
  abstract_summary: "In recent years, the rapid pace of urbanization has posed profound challenges globally, exacerbating environmental concerns and escalating traffic congestion in metropolitan areas. To mitigate these issues, Advanced Air Mobility (AAM) has emerged as a promising transportation alternative. However, the effective implementation of AAM requires robust demand modeling. This study delves into the demand dynamics of AAM by analyzing employment based trip data across Tennessee’s census tracts, employing statistical techniques and machine learning models to enhance accuracy in demand forecasting. Drawing on datasets from the Bureau of Transportation Statistics (BTS), the Internal Revenue Service (IRS), the Federal Aviation Administration (FAA), and additional sources, we perform cost, time, and risk assessments to compute the Generalized Cost of Trip (GCT). Our findings indicate that trips are more likely to be viable for AAM if air transportation accounts for over 70% of the GCT and the journey spans more than 250 miles. The study not only refines the understanding of AAM demand but also guides strategic planning and policy formulation for sustainable urban mobility solutions."
  research_summary:
    - "This paper estimates Advanced Air Mobility demand for Tennessee at the census-tract level using employment-based trip data. It focuses on identifying trips that could plausibly shift from ground transportation to AAM."
    - "The study combines data from BTS, IRS, FAA, LODES, and other sources to model trip cost, travel time, and risk. These components are integrated into a Generalized Cost of Trip framework."
    - "All 70 airports in Tennessee are considered as potential AAM hubs, allowing the model to represent ground access, air travel, and destination access as part of an AAM journey."
    - "The paper reports that Tennessee trips are more likely to become AAM demand when air transportation contributes more than 70% of total GCT and trip distance exceeds 250 miles."
  plain_language_summary: "The paper estimates which Tennessee work-related trips could shift to AAM by comparing ground and air options through cost, time, and risk."
  contributions:
    - "Models AAM demand at the Tennessee census-tract level using employment-based trip data."
    - "Develops cost, time, and risk models for ground transportation and AAM."
    - "Computes Generalized Cost of Trip to compare mode viability."
    - "Considers all 70 Tennessee airports as AAM hubs."
    - "Identifies thresholds for AAM-favorable trips based on air share of GCT and trip distance."
  impact: "AAM planning depends on realistic demand estimates that account for employment flows, trip distance, airport access, cost, time, and risk. This paper provides a tract-level framework for evaluating where AAM may be viable in Tennessee."
  framework_steps:
    title: "Census-Tract AAM Demand Modeling Workflow"
    items:
    - name: "Collect Employment Trips"
      description: "Uses Tennessee census-tract employment-based trip data to identify candidate AAM demand."
    - name: "Model Cost, Time, and Risk"
      description: "Combines BTS, IRS, FAA, LODES, and related datasets to estimate modal cost, travel time, and risk."
    - name: "Compute GCT"
      description: "Calculates Generalized Cost of Trip for ground transportation and AAM alternatives."
    - name: "Estimate AAM Selection"
      description: "Identifies trips likely to shift to AAM based on air share of GCT and trip-distance thresholds."
  modeling_approaches_title: "Demand Modeling Components"
  modeling_approaches:
    - name: "Employment-Based OD Demand"
      description: "Uses census-tract commuting and employment flows as proxy demand for passenger AAM trips."
    - name: "Airport Hub Network"
      description: "Considers all 70 Tennessee airports as possible AAM hubs for access and egress modeling."
    - name: "Cost-Time-Risk GCT"
      description: "Combines monetary cost, travel duration, and risk into a comparable mode-choice measure."
    - name: "Threshold Analysis"
      description: "Finds AAM trips are more likely when air transportation exceeds 70% of GCT and distance exceeds 250 miles."

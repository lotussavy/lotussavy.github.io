  title: "Urban Air Mobility Flight Demand Modeling for Airports in New York City"
  slug: "urban-air-mobility-flight-demand-modeling-for-airports-in-new-york-city"
  venue: "AIAA SCITECH 2026 Forum"
  doi: "10.2514/6.2026-1475"
  url: "https://doi.org/10.2514/6.2026-1475"
  schema_part_of: "PublicationIssue"
  tags:
    - "Urban Air Mobility"
    - "Airport Demand Modeling"
    - "Advanced Air Mobility"
    - "Generalized Cost of Trip"
    - "Value of Reliability"
  research_area: "Urban Air Mobility and Airport Access Demand"
  pages: "1-12"
  source_url: "https://arc.aiaa.org/doi/10.2514/6.2026-1475"
  hero_subtitle: "An AIAA SCITECH 2026 paper on forecasting airport-access Urban Air Mobility demand in New York City by combining 2023 TLC trip records, taxi-zone features, generalized trip cost, and travel-time reliability."
  abstract_summary: "Rapid urbanization has intensified congestion and travel delays in New York City, motivating interest in Urban Air Mobility (UAM) as a faster and more reliable option for accessing the region’s three major airports: John F. Kennedy (JFK), LaGuardia (LGA), and Newark Liberty (EWR). This paper develops a data-driven framework for forecasting UAM demand by integrating 2023 New York City Taxi & Limousine Commission trip records with socioeconomic and geospatial taxi-zone features. A Generalized Cost of Trip (GCT), combining monetary cost, value of time (VOT), and value of reliability (VOR), is computed for airport-bound origin–destination pairs and used to estimate mode-switching probabilities across early, mid, and mature UAM phases. Results show that several high-congestion Manhattan zones exhibit lower UAM GCT than taxis even in the early phase for all three airports, while Queens and Brooklyn become competitive as UAM costs decline and cruise speeds increase. Hourly switching patterns reveal that reliability-sensitive peak periods drive the highest adoption, with mature-phase conditions capturing over 80–95% of airport trips from major pickup zones. These findings demonstrate that UAM offers increasing advantages for airport access as congestion and technology evolve, providing quantitative guidance for fleet sizing, vertiport siting, pricing strategies, and phased deployment planning in dense metropolitan regions."
  research_summary:
    - "This paper studies UAM as an airport-access service for New York City's three major airports: JFK, LaGuardia, and Newark Liberty. NYC is an appropriate test case because high population density, severe congestion, extensive for-hire vehicle use, and detailed public trip records make airport-access demand measurable at taxi-zone resolution."
    - "The method begins with 2023 TLC Yellow Taxi, Green Taxi, and high-volume for-hire vehicle records. After cleaning missing values, outliers, unknown taxi zones, and non-airport trips, the data are aggregated into hourly origin-destination flows between taxi zones and airport zones. Ground transportation uses observed taxi distance, fare, and duration, while UAM uses orthodromic distance and eVTOL cost and speed assumptions."
    - "A central contribution is the use of Value of Reliability inside the generalized cost framework. Instead of comparing modes only by average fare and average travel time, the paper accounts for variability in travel time and distance, which is especially important for airport travelers facing congestion and schedule risk."
    - "The results show strong spatial and temporal differentiation. Central Manhattan zones can have lower UAM generalized cost than taxis even in the early phase, while Queens and Brooklyn become more competitive as UAM matures. Hourly switching analysis shows that peak periods, when reliability matters most, drive the highest adoption probabilities."
  plain_language_summary: "The paper estimates when airport air taxi trips could beat ground taxi trips in New York City. It shows that UAM is most attractive for congested, reliability-sensitive airport trips, especially from Manhattan and during peak travel periods."
  contributions:
    - "Develops a data-driven airport-access UAM demand framework for JFK, LaGuardia, and Newark Liberty using 2023 NYC TLC trip records."
    - "Integrates socioeconomic and geospatial taxi-zone features with hourly airport-bound origin-destination travel data."
    - "Computes generalized cost of trip for taxis and UAM using monetary cost, value of time, and value of reliability."
    - "Models mode-switching probability across early, mid, and mature UAM phases using phase-specific cost and cruise-speed assumptions."
    - "Identifies spatial and hourly adoption patterns that can inform fleet sizing, vertiport siting, pricing, and phased deployment planning."
  impact: "Airport access is one of the most plausible early UAM markets because travelers place high value on time and reliability. This paper gives planners a quantitative way to identify which NYC origin zones, boroughs, hours, and deployment phases are most likely to support viable UAM service."
  framework_steps:
    title: "NYC Airport UAM Demand Modeling Framework"
    items:
    - name: "Data Processing"
      description: "Collects 2023 Yellow Taxi, Green Taxi, and HV-FHV trip records, removes missing values, outliers, unknown zones, and non-airport trips, then aggregates records into hourly airport-bound OD flows."
    - name: "Region and Airports"
      description: "Models demand at NYC taxi-zone resolution for JFK, LaGuardia, and Newark Liberty, represented by TLC taxi zones 132, 138, and 1."
    - name: "Generalized Cost"
      description: "Calculates taxi GCT from fare, value of time, travel-time variability, and distance variability, while calculating UAM GCT from cost per mile, orthodromic distance, cruise speed, and value of time."
    - name: "Mode Choice"
      description: "Uses a probabilistic mode-choice formulation to estimate UAM switching probabilities from the difference between taxi and UAM generalized costs."
  modeling_approaches_title: "Methods and Assumptions"
  modeling_approaches:
    - name: "Airport Access Market"
      description: "Centers the analysis on airport-bound trips to JFK, LGA, and EWR, where congestion and schedule reliability strongly affect traveler preferences."
    - name: "Reliability-Aware GCT"
      description: "Extends the generalized cost of trip beyond fare and average time by adding value of reliability for travel-time and distance variability."
    - name: "UAM Phase Scenarios"
      description: "Defines early, mid, and mature UAM phases with cost assumptions of $15, $10, and $5 per mile and cruise speeds of 125, 150, and 175 mph."
    - name: "Hourly Switching"
      description: "Evaluates mode-switching probabilities by hour to show how peak-period congestion and reliability sensitivity affect adoption."
    - name: "Borough and Zone Analysis"
      description: "Compares trip-weighted average generalized cost and switching behavior across top taxi zones and major NYC boroughs."

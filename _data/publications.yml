  abstract_summary: "This paper proposes an optimization framework for pre-disaster air mobility planning. It aggregates airport operational data, estimates evacuation-flight capacity without disrupting regular traffic, and introduces a neural-network-accelerated genetic algorithm to reduce computational overhead while preserving planning quality for airport schedule adjustment."
  research_summary:
    - "This paper focuses on air mobility planning before weather-related disasters. As severe weather approaches, airports may need to support evacuation or disruption-management operations while still preserving regular traffic as much as possible."
    - "The study formulates the planning problem as an optimization task and uses a genetic algorithm to search for effective evacuation-flight schedules. A neural network is used to accelerate the genetic algorithm and reduce computational overhead."
    - "This approach is useful because emergency planning often requires timely decisions. Faster optimization can help planners evaluate more scenarios while maintaining operational feasibility."
  plain_language_summary: "The paper uses neural networks to speed up a genetic algorithm for planning evacuation flights before weather disasters, helping airports respond faster under constrained operating conditions."
  contributions:
    - "Models airport schedule adjustment for pre-disaster evacuation planning."
    - "Uses multi-airport operational data to estimate outgoing evacuation capacity."
    - "Introduces a neural-network-accelerated genetic algorithm."
    - "Shows reduced computational overhead while maintaining comparable optimization quality."
  impact: "The work supports faster decision-making for air mobility operations when severe weather events are approaching."


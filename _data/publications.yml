  title: "Regional Air Mobility Flight Demand Modeling in Tennessee State"
  slug: "regional-air-mobility-flight-demand-modeling-in-tennessee-state"
  venue: "AIAA SCITECH 2025 Forum"
  doi: "10.2514/6.2025-2783"
  url: "https://doi.org/10.2514/6.2025-2783"
  schema_part_of: "PublicationIssue"
  tags:
    - "Regional Air Mobility"
    - "Demand Modeling"
    - "Advanced Air Mobility"
    - "Generalized Travel Cost"
    - "Risk Modeling"
  research_area: "Regional Air Mobility Demand Modeling"
  repository_url: "https://mdsoar.org/items/237874af-0445-472f-8241-151a011fa5d3"
  preprint_url: "https://arxiv.org/abs/2412.10445"
  source_url: "https://arc.aiaa.org/doi/10.2514/6.2025-2783"
  pages: "1-21"
  abstract_summary: "Advanced Air Mobility (AAM), encompassing Urban Air Mobility (UAM) and Regional Air Mobility (RAM), offers innovative solutions to mitigate the issues related to ground transportation like traffic congestion, environmental pollution etc. RAM addresses transportation inefficiencies over medium-distance trips (50-500 miles), which are often underserved by both traditional air and ground transportation systems. This study focuses on RAM in Tennessee, addressing the complexities of demand modeling as a critical aspect of effective RAM implementation. Leveraging datasets from the Bureau of Transportation Statistics (BTS), Internal Revenue Service (IRS), Federal Aviation Administration (FAA), and other sources, we assess trip data across Tennessee’s Metropolitan Statistical Areas (MSAs) to develop a predictive framework for RAM demand. Through cost, time, and risk regression, we calculate a Generalized Travel Cost (GTC) that allows for comparative analysis between ground transportation and RAM, identifying factors that influence mode choice. When focusing on only five major airports (BNA, CHA, MEM, TRI, and TYS) as RAM hubs, the results reveal a mixed demand pattern due to varying travel distances to these central locations, which increases back-and-forth travel for some routes. However, by expanding the RAM network to include more regional airports, the GTC for RAM aligns more closely with traditional air travel, providing a smoother and more competitive option against ground transportation, particularly for trips exceeding 300 miles. The analysis shows that RAM demand is likely to be selected when air transportation accounts for more than 80% of the total GTC, air travel time is more than 1 hour and when the ground GTC exceeds 300 for specific origin-destination pairs."
  research_summary:
    - "This paper studies Regional Air Mobility demand for medium-distance trips in Tennessee, focusing on the 50-500 mile range where driving can be inefficient and conventional air service may be inaccessible or inconvenient. Demand is modeled at the Metropolitan Statistical Area level, including Tennessee MSAs and non-MSA regions."
    - "The framework combines trip demand from NextGen NHTS origin-destination data with multiple public datasets: BTS fatality and airline market data, USDoT value of statistical life guidance, IRS mileage rates, FAA block-time data, inter-airport distances, Google Maps ground distance and time, Gazetteer centroid files, and Bureau of Labor Statistics wage data."
    - "The method develops cost, time, and risk models for ground transportation and air transportation, then combines them into a Generalized Travel Cost framework. RAM trips are represented as multimodal journeys: ground access from the origin MSA centroid to a hub airport, RAM flight between airports, and ground egress from the destination airport to the destination MSA centroid."
    - "The results compare two network assumptions. With only five major Tennessee airports as RAM hubs, some origin-destination pairs experience inefficient back-and-forth travel. When the network expands to include additional regional airports nearest to each MSA, RAM generalized travel cost follows the airline pattern more closely and becomes more competitive for longer trips."
    - "The selection analysis shows that RAM is most attractive for trips over roughly 300 miles, when the air portion accounts for more than 80% of total RAM GTC, when air travel time exceeds one hour, and when ground GTC is above 300 for specific OD pairs."
  plain_language_summary: "The paper estimates when regional air mobility flights could be a better option than driving for trips between Tennessee metropolitan areas, especially for longer trips where driving cost, time, and risk become high."
  contributions:
    - "Develops an MSA-level Regional Air Mobility demand modeling framework for Tennessee."
    - "Uses cost, time, and risk regression to compare ground transportation, airlines, and RAM."
    - "Integrates generalized travel cost with a probabilistic mode-choice model for RAM selection."
    - "Compares a five-major-airport RAM hub network against an expanded regional-airport network."
    - "Identifies RAM-favorable conditions based on trip distance, air-share of GTC, air travel time, and ground GTC."
  impact: "This work gives planners a quantitative basis for deciding where RAM service could improve regional connectivity in Tennessee, and shows why airport network design matters as much as aircraft performance for medium-distance markets."
  hero_subtitle: "An AIAA SCITECH 2025 paper on Tennessee Regional Air Mobility demand modeling using MSA-level trip demand, cost-time-risk regression, generalized travel cost, and airport network scenarios."
  framework_steps:
    title: "Tennessee RAM Demand Modeling Framework"
    items:
    - name: "Generate Trip Demand"
      description: "Uses NextGen NHTS passenger OD data at the MSA level and filters trips to the RAM-relevant 50-500 mile range."
    - name: "Model Cost, Time, and Risk"
      description: "Builds regression models for monetary cost, travel time, and fatality-risk cost using BTS, FAA, IRS, Google Maps, BLS, and USDoT datasets."
    - name: "Compute GTC"
      description: "Combines cost, wage-weighted travel time, and risk into Generalized Travel Cost for ground, airline, and RAM alternatives."
    - name: "Predict RAM Selection"
      description: "Uses a probabilistic mode-choice formulation to estimate when travelers are likely to switch from ground transportation to RAM."
  modeling_approaches_title: "Methods and Network Scenarios"
  modeling_approaches:
    - name: "MSA-Level Demand"
      description: "Represents travel between Tennessee MSAs using population centroids for origin and destination locations."
    - name: "Five-Hub Case"
      description: "Tests RAM service using BNA, CHA, MEM, TRI, and TYS as major airport hubs, revealing inefficiencies for some OD pairs due to added access travel."
    - name: "Expanded-Airport Case"
      description: "Adds regional airports nearest to each MSA, reducing backtracking and making RAM GTC align more closely with traditional air travel."
    - name: "Risk-Aware GTC"
      description: "Includes fatality-risk cost using value of statistical life assumptions, alongside direct cost and wage-weighted travel time."
    - name: "Selection Thresholds"
      description: "Finds RAM is more likely for trips exceeding about 300 miles, air travel times above one hour, and OD pairs where ground GTC exceeds 300."
  research_gaps:
    - "MSA-level RAM demand"
    - "Risk-aware mode choice"
    - "Regional airport access"
    - "Seasonal demand variation"
    - "Underutilized MSAs"
    - "Balanced infrastructure investment"

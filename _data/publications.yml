  title: "Decoding Android Malware with a Fraction of Features: An Attention-Enhanced MLP-SVM Approach"
  slug: "decoding-android-malware-with-fraction-of-features-attention-enhanced-mlp-svm-approach"
  venue: "NSS 2024 (LNCS 15564, 2025)"
  doi: "10.1007/978-981-96-3531-3_10"
  url: "https://doi.org/10.1007/978-981-96-3531-3_10"
  schema_part_of: "PublicationIssue"
  tags:

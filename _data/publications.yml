  title: "A Data-Driven Approach to Enhancing Gravity Models for Trip Demand Prediction"
  slug: "data-driven-approach-to-enhancing-gravity-models-for-trip-demand-prediction"
  venue: "IEEE CAI 2025"
  doi: "10.1109/CAI64502.2025.00145"
  url: "https://doi.org/10.1109/CAI64502.2025.00145"
  schema_part_of: "PublicationIssue"
  tags:
    - "Gravity Models"
    - "Trip Demand Prediction"
    - "Data-Driven Modeling"
    - "Machine Learning"
  research_area: "Data-Driven Transportation Demand Modeling"
  preprint_url: "https://arxiv.org/abs/2506.01964"
  pages: "815-820"
  abstract_summary: "Accurate prediction of trips between zones is critical for transportation planning, as it supports resource allocation and infrastructure development across various modes of transport. Although the gravity model has been widely used due to its simplicity, it often inadequately represents the complex factors influencing modern travel behavior. This study introduces a data-driven approach to enhance the gravity model by integrating geographical, economic, social, and travel data from the counties in Tennessee and New York state. Using machine learning techniques, we extend the capabilities of the traditional model to handle more complex interactions between variables. Our experiments demonstrate that machine learning-enhanced models significantly outperform the traditional model. Our results show a 51.48% improvement in R2, indicating a substantial enhancement in the model’s explanatory power. Also, a 63.59% reduction in Mean Absolute Error (MAE) reflects a significant increase in prediction accuracy. Furthermore, a 44.32% increase in Common Part of Commuters (CPC) demonstrates improved prediction reliability. These findings highlight the substantial benefits of integrating diverse datasets and advanced algorithms into transportation models. They provide urban planners and policymakers with more reliable forecasting and decision-making tools."
  research_summary:
    - "This paper enhances the traditional gravity model for county-level trip demand prediction by integrating geographic, economic, social, and travel-pattern features from Tennessee and New York."
    - "The work is motivated by the gravity model's interpretability and wide use, but also by its limitations in capturing nonlinear relationships and multidimensional factors that shape modern travel behavior."
    - "Machine learning models, including neural networks, random forests, and gradient boosting, are used to extend gravity-style trip prediction beyond simple population-distance relationships."
    - "The evaluation shows that data-driven models outperform the traditional gravity model, with reported improvements of 51.48% in R-squared, 63.59% reduction in MAE, and 44.32% increase in CPC."
  plain_language_summary: "The paper upgrades the classic gravity model used in transportation planning by adding machine learning and richer datasets, making origin-destination trip predictions more accurate."
  contributions:
    - "Integrates geographic, economic, social, and travel data into gravity-model enhancement."
    - "Uses machine learning to capture nonlinear trip-demand relationships."
    - "Validates the approach on Tennessee and New York county-level travel data."
    - "Reports large improvements across R-squared, MAE, and CPC compared with the traditional gravity model."
  impact: "The work provides transportation planners with a more reliable forecasting approach while preserving the practical structure of gravity-based demand modeling."
  hero_subtitle: "An IEEE CAI conference paper that enhances classic gravity models for trip-demand prediction with richer regional datasets and machine learning."
  framework_steps:
    title: "Enhanced Gravity Modeling Pipeline"
    items:
    - name: "Collect Regional Data"
      description: "Combines geographic, economic, social, and travel datasets for county-level demand modeling."
    - name: "Represent OD Pairs"
      description: "Builds origin-destination features that preserve the practical structure of gravity-based planning."
    - name: "Learn Nonlinear Effects"
      description: "Uses machine learning to capture relationships that traditional gravity models can miss."
    - name: "Validate Forecasts"
      description: "Evaluates demand estimates with R-squared, MAE, and CPC across Tennessee and New York."
  modeling_approaches_title: "Method Components"
  modeling_approaches:
    - name: "Gravity Model Baseline"
      description: "Provides an interpretable transportation-planning foundation for origin-destination trip prediction."
    - name: "Machine Learning Enhancement"
      description: "Improves prediction by learning nonlinear relationships among geography, economy, society, and travel behavior."
    - name: "Multi-Region Validation"
      description: "Tests the approach on Tennessee and New York data to examine regional applicability."
    - name: "Feature Importance"
      description: "Analyzes top-ranked predictors such as distance, travel time, population, and economic factors."

  title: "Improving Air Mobility for Pre-Disaster Planning with Neural Network Accelerated Genetic Algorithm"
  slug: "improving-air-mobility-for-pre-disaster-planning-with-neural-network-accelerated-genetic-algorithm"
  venue: "IEEE ITSC 2024"
  doi: "10.1109/ITSC58415.2024.10920105"
  url: "https://doi.org/10.1109/ITSC58415.2024.10920105"
  schema_part_of: "PublicationIssue"
  tags:
    - "Pre-Disaster Planning"
    - "Genetic Algorithm"
    - "Air Mobility"
    - "Neural Networks"
    - "Evacuation Planning"
  research_area: "Air Mobility Optimization for Disaster Planning"
  pages: "1290-1295"
  preprint_url: "https://arxiv.org/abs/2408.00790"
  abstract_summary: "Weather disaster related emergency operations pose a great challenge to air mobility in both aircraft and airport operations, especially when the impact is gradually approaching. We propose an optimized framework for adjusting airport operational schedules for such pre-disaster scenarios. We first, aggregate operational data from multiple airports and then determine the optimal count of evacuation flights to maximize the impacted airport’s outgoing capacity without impeding regular air traffic. We then propose a novel Neural Network (NN) accelerated Genetic Algorithm (GA) for evacuation planning. Our experiments show that integration yielded comparable results but with smaller computational overhead. We find that the utilization of a NN enhances the efficiency of a GA, facilitating more rapid convergence even when operating with a reduced population size. This effectiveness persists even when the model is trained on data from airports different from those under test."
  research_summary:
    - "This paper focuses on pre-disaster air mobility planning for approaching weather disasters, where airports may need to increase outbound evacuation capacity while preserving routine airspace operations."
    - "The framework uses non-commercial airport capacity, such as military and general aviation operational capacity, to schedule additional evacuation flights without fully disrupting regular traffic."
    - "The optimization problem is addressed with a genetic algorithm, then accelerated by a neural network trained for only a small number of epochs. The neural network helps reduce population size and convergence time while preserving comparable solution quality."
    - "Experiments using real flight operation data show comparable fitness, flight counts, and destination airport selection between standalone GA and NN-accelerated GA, including when the NN was trained on different airports from those under test."
  plain_language_summary: "The paper uses neural networks to speed up a genetic algorithm for planning evacuation flights before weather disasters, helping airports respond faster under constrained operating conditions."
  contributions:
    - "Proposes a pre-disaster scheduling framework that increases outbound airport capacity while maintaining normal airspace operations."
    - "Uses non-critical airport capacity to support evacuation flights before disaster impact."
    - "Introduces a neural-network-accelerated genetic algorithm for evacuation planning."
    - "Shows that NN assistance can reduce computational overhead and speed GA convergence."
    - "Evaluates generalization when the NN is trained on airports different from the test airports."
  impact: "The work supports faster decision-making for air mobility operations when severe weather events are approaching."
  hero_subtitle: "An IEEE ITSC conference paper on using neural-network acceleration to make genetic-algorithm-based pre-disaster air mobility planning faster."
  framework_steps:
    title: "Pre-Disaster Air Mobility Optimization Framework"
    items:
    - name: "Aggregate Operations"
      description: "Uses multi-airport operational data to estimate available non-commercial capacity for evacuation-support flights."
    - name: "Formulate Planning"
      description: "Models schedule adjustment as an optimization problem under regular traffic and emergency constraints."
    - name: "Search Schedules"
      description: "Uses a genetic algorithm to explore feasible evacuation-flight schedule changes."
    - name: "Accelerate Search"
      description: "Uses neural network approximation to reduce computational overhead during optimization."
  modeling_approaches_title: "Method Components"
  modeling_approaches:
    - name: "Genetic Algorithm"
      description: "Searches over possible schedule adjustments for pre-disaster air mobility planning."
    - name: "Neural Network Acceleration"
      description: "Speeds GA convergence even with reduced population size and limited NN training."
    - name: "Airport Capacity Modeling"
      description: "Estimates outgoing evacuation capacity while preserving regular operations as much as possible."
    - name: "Cross-Airport Generalization"
      description: "Tests whether an NN trained on one airport can still support GA search for other airports."

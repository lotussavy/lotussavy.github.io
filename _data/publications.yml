  title: "Demand Modeling for Advanced Air Mobility"
  slug: "demand-modeling-for-advanced-air-mobility"
  venue: "IEEE BigData 2024"
  doi: "10.1109/BigData62323.2024.10825121"
  url: "https://doi.org/10.1109/BigData62323.2024.10825121"
  schema_part_of: "PublicationIssue"
  tags:

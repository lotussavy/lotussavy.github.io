  title: "Neurosymbolic Reinforcement Learning and Planning: A Survey"
  slug: "neurosymbolic-reinforcement-learning-and-planning-survey"
  venue: "IEEE Transactions on Artificial Intelligence"
  doi: "10.1109/TAI.2023.3311428"
  url: "https://doi.org/10.1109/TAI.2023.3311428"
  schema_part_of: "Periodical"
  tags:

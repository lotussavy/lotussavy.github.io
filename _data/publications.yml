  abstract_summary: "Accurately predicting flight demand is essential for optimizing air travel operations and resource allocation. In our research, we explore the relationship between temporal patterns and flight demand, leveraging hourly data rather than traditional meteorological factors. Through analysis, we discovered significant correlations between hour of the day and flight demand, prompting the creation of features such as peak hours and time segments (morning, afternoon, evening). By utilizing these temporal features, we develop predictive models employing various machine learning algorithms, including LSTM, linear regression, and gradient boosting models. We aim to identify the most effective approach for accurately forecasting flight demand, with implications extending to the optimization of Advanced Air Mobility (AAM) solutions, where understanding temporal patterns is crucial for efficient resource allocation and urban air transportation network design."
  research_summary:
    - "This paper studies flight-demand forecasting as a foundation for Advanced Air Mobility operations, where accurate hourly demand estimates can improve scheduling, resource allocation, and urban air transportation network design."
    - "The method integrates historical weather data from NOAA with FAA hourly records of flight departures and arrivals. The dataset is preprocessed by handling missing values, normalizing numerical features, and engineering temporal features such as peak-hour indicators and morning, afternoon, and evening time segments."
    - "The paper evaluates several predictive models, including LSTM, linear regression, gradient boosting, and transformer models, using MSE, MAE, MAPE, and R-squared across Tennessee airports."
    - "Results show that LSTM and Transformer models effectively capture temporal flight-demand patterns, with the Transformer model demonstrating stronger MAPE performance in the reported comparison."
  plain_language_summary: "The paper predicts airport flight demand from hourly patterns so future AAM systems can schedule vehicles and allocate resources more effectively."
  contributions:
    - "Models flight demand using hourly temporal patterns rather than relying only on meteorological or seasonal factors."
    - "Creates features such as peak hours and time-of-day segments to capture operational demand variation."
    - "Compares LSTM, linear regression, gradient boosting, and transformer-based approaches."
    - "Evaluates forecasting performance across multiple Tennessee airports."
    - "Connects temporal flight-demand prediction to AAM resource allocation and network planning."
  impact: "Reliable forecasting is necessary before AAM services can be planned, evaluated, and deployed at scale."
  framework_steps:
    title: "Hourly Flight-Demand Forecasting Workflow"
    items:
    - name: "Collect Data"
      description: "Combines NOAA hourly weather observations with FAA records of flight departures and arrivals."
    - name: "Engineer Temporal Features"
      description: "Creates hour-of-day, peak-hour, and time-segment features to represent demand patterns."
    - name: "Train Forecasting Models"
      description: "Fits LSTM, linear regression, gradient boosting, and transformer models to historical flight-demand data."
    - name: "Evaluate Forecasts"
      description: "Compares models using MSE, MAE, MAPE, and R-squared across selected Tennessee airports."
  modeling_approaches_title: "Forecasting Methods"
  modeling_approaches:
    - name: "LSTM"
      description: "Captures long-term dependencies in hourly flight-demand sequences."
    - name: "Transformer"
      description: "Models complex temporal sequence patterns and shows strong reported MAPE performance."
    - name: "Gradient Boosting"
      description: "Builds predictive power through ensembles of weak learners over engineered demand features."
    - name: "Linear Regression"
      description: "Provides an interpretable baseline for comparing more expressive time-series models."
  research_gaps:
    - "Hourly demand variation"
    - "Temporal feature design"
    - "Airport-level transferability"
    - "AAM resource allocation"
    - "Network scheduling"

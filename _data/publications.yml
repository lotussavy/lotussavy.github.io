  title: "Neurosymbolic Approach for Travel Demand Prediction: Integrating Decision Tree Rules into Neural Networks"
  slug: "neurosymbolic-approach-for-travel-demand-prediction-integrating-decision-tree-rules-into-neural-networks"
  venue: "IWCMC 2025"
  doi: "10.1109/IWCMC65282.2025.11059465"
  url: "https://doi.org/10.1109/IWCMC65282.2025.11059465"
  schema_part_of: "PublicationIssue"
  tags:
    - "Travel Demand Prediction"
    - "Neurosymbolic AI"
    - "Decision Trees"
    - "Neural Networks"
    - "Explainable AI"
  research_area: "Neurosymbolic Travel Demand Prediction"
  preprint_url: "https://arxiv.org/abs/2502.01680"
  pages: "600-605"
  abstract_summary: "Accurate travel demand prediction is essential for effective transportation planning, infrastructure development, and resource optimization. Traditional models often lack both interpretability and the ability to capture complex, nonlinear relationships across geospatial and socioeconomic variables. To address this, we propose a Neurosymbolic AI framework that integrates decision tree (DT) based symbolic reasoning with neural network (NN) learning for travel demand forecasting. The model leverages multisource data including geospatial, economic, and mobility datasets and embeds interpretable if-then rules extracted from DTs as additional features in the NN. Our experiments demonstrate that this hybrid approach improves predictive accuracy across key metrics, achieving up to 24.19% reduction in Mean Absolute Error (MAE), 1.79% improvement in R2, and 6.49% in Common Part of Commuters (CPC) compared to NN models. Rules extracted at finer variance thresholds (e.g., 0.0001) capture nuanced patterns and enhance model alignment with observed commuter behavior. By combining symbolic interpretability with neural generalization, the proposed method advances both the transparency and performance of travel demand modeling."
  research_summary:
    - "This paper targets travel demand prediction between regions using geospatial, economic, and mobility datasets. It is motivated by the gap between interpretable but limited traditional models and accurate but opaque neural models."
    - "The proposed neurosymbolic framework trains decision trees to extract symbolic if-then rules, selects useful rules using variance thresholds, encodes those rules as additional neural network inputs, and then trains a neural model that combines raw features with symbolic structure."
    - "The evaluation compares the hybrid DT-rule-plus-NN model against neural baselines using MAE, R-squared, and Common Part of Commuters. The paper reports improvements up to 24.19% in MAE, 1.79% in R-squared, and 6.49% in CPC."
    - "The findings show that finer variance thresholds, especially 0.0001, can capture nuanced commuter behavior and improve the alignment between model predictions and observed travel patterns."
  plain_language_summary: "The paper improves trip-demand forecasting by letting a neural network learn not only from raw data, but also from decision-tree rules that make important travel patterns easier to interpret."
  contributions:
    - "Introduces a neurosymbolic travel demand prediction framework combining DT-based symbolic rules with NN learning."
    - "Encodes interpretable if-then rules as additional neural network features."
    - "Uses variance-based rule selection to balance model complexity, interpretability, and predictive value."
    - "Reports improvements over NN baselines across MAE, R-squared, and CPC."
    - "Demonstrates that symbolic interpretability and neural generalization can improve transportation forecasting together."
  impact: "The work demonstrates a practical way to bring rule-based interpretability into data-driven transportation demand models."
  hero_subtitle: "An IWCMC conference paper on improving travel demand prediction by injecting decision-tree-derived symbolic rules into neural network learning."
  framework_steps:
    title: "Neurosymbolic Demand Prediction Pipeline"
    items:
    - name: "Build Features"
      description: "Uses multisource geospatial, economic, and mobility datasets to represent origin-destination travel demand."
    - name: "Extract DT Rules"
      description: "Learns interpretable decision-tree if-then rules that capture symbolic travel-demand relationships."
    - name: "Select and Encode Rules"
      description: "Uses variance thresholds to select useful rules and encode them as additional neural network inputs."
    - name: "Evaluate Demand"
      description: "Measures prediction quality with MAE, R-squared, and Common Part of Commuters."
  modeling_approaches_title: "Method Components"
  modeling_approaches:
    - name: "Decision Trees"
      description: "Provide human-readable if-then rules that summarize important demand relationships."
    - name: "Neural Networks"
      description: "Capture nonlinear patterns in transportation data and support flexible demand prediction."
    - name: "Rule-Augmented Learning"
      description: "Combines symbolic rule information with data-driven training to balance accuracy and interpretability."
    - name: "Variance-Based Rule Selection"
      description: "Controls rule granularity so the model can capture nuanced commuter patterns without overwhelming the neural learner."

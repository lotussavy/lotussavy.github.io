  title: "Long Short-Term Memory Neural Network Assisted Peak to Average Power Ratio Reduction for Underwater Acoustic Orthogonal Frequency Division Multiplexing Communication"
  slug: "lstm-neural-network-assisted-papr-reduction-for-underwater-acoustic-ofdm-communication"
  venue: "KSII Transactions on Internet & Information Systems"
  doi: "10.3837/tiis.2023.01.013"
  url: "https://doi.org/10.3837/tiis.2023.01.013"
  schema_part_of: "Periodical"
  tags:
    - "Machine Learning"
